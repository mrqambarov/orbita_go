version: '3.8'

services:
  # Database Service (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: orbita-go-postgres
    restart: always
    environment:
      POSTGRES_USER: orbitago
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD .env faylida yoki shell muhitida o'rnatilishi shart}
      POSTGRES_DB: orbita_go
    # Tashqi portga chiqarilmagan — faqat backend docker tarmog'i ichidan ulanadi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbitago -d orbita_go"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend App Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orbita-go-backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: "postgresql://orbitago:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD kerak}@postgres:5432/orbita_go?schema=public"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET .env faylida yoki shell muhitida o'rnatilishi shart (openssl rand -hex 32)}
      ADMIN_SECRET: ${ADMIN_SECRET:?ADMIN_SECRET .env faylida yoki shell muhitida o'rnatilishi shart (openssl rand -hex 32)}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
