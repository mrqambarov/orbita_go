name: orbita_go
description: "Orbita Go — O'zbekistonning aqlli taxi xizmati"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP & API
  dio: ^5.7.0
  retrofit: ^4.4.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Maps — Yandex
  yandex_mapkit: ^3.4.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Socket.io (real-time)
  socket_io_client: ^2.0.3+1

  # Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.15
  pinput: ^3.0.0

  # Utils
  intl: ^0.20.2
  permission_handler: ^11.4.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  retrofit_generator: ^9.1.3
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
